<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma de Tutorías - Mapa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 100vh; width: 100%; z-index: 1; }
    </style>
</head>
<body class="bg-gray-100 flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <div class="w-80 bg-white shadow-lg flex flex-col z-10 sticky top-0 h-full">
        <!-- Profile Header -->
        <div class="p-6 bg-blue-600 text-white shadow-md">
            <h2 class="text-xl font-bold mb-2" id="welcome-msg">Hola, Usuario</h2>
            <p class="text-sm opacity-90" id="role-msg">Rol: Estudiante</p>
            <div class="mt-4">
                <button onclick="logout()" class="text-sm bg-white text-blue-600 px-3 py-1 rounded hover:bg-gray-100 font-bold">Cerrar Sesión</button>
            </div>
        </div>

        <!-- Controls -->
        <div class="p-6 flex-1 overflow-y-auto space-y-6">
            <!-- Location Settings -->
            <div>
                <h3 class="font-bold text-gray-800 mb-3 border-b pb-1">Mi Ubicación</h3>
                <button id="btn-get-location" class="w-full bg-blue-100 text-blue-700 font-semibold py-2 px-4 rounded mb-3 hover:bg-blue-200 transition">
                    📍 Localizarme Automáticamente
                </button>
                <p class="text-xs text-gray-500 mb-2">O ingresa tu dirección manualmente:</p>
                <div class="flex gap-2">
                    <input type="text" id="manual-location" placeholder="ej. Madrid, España" class="flex-1 w-full px-3 py-2 border border-gray-300 rounded text-sm focus:outline-none focus:border-blue-500">
                    <button id="btn-search-location" class="bg-blue-600 text-white px-3 border border-transparent rounded hover:bg-blue-700">🔎</button>
                </div>
                <div class="mt-2 text-sm text-green-600 hidden" id="loc-status">¡Ubicación actualizada!</div>
            </div>

            <!-- Profile Settings (Only for Tutors) -->
            <div id="tutor-settings" class="hidden">
                <h3 class="font-bold text-gray-800 mb-3 border-b pb-1">Ajustes de Tutor</h3>
                <button id="btn-update-profile" class="w-full bg-green-100 text-green-700 font-semibold py-2 px-4 rounded hover:bg-green-200 transition mb-2">
                    📝 Actualizar Detalles del Perfil
                </button>
                <button id="btn-set-tutor-loc" class="w-full bg-indigo-100 text-indigo-700 font-semibold py-2 px-4 rounded hover:bg-indigo-200 transition mb-2">
                    📌 Usar mi ubicación actual en el mapa
                </button>
                <div class="flex items-center justify-between bg-gray-50 p-2 rounded mt-2">
                    <span class="text-sm font-medium">Disponible</span>
                    <input type="checkbox" id="tutor-availability" class="w-4 h-4 text-blue-600">
                </div>
            </div>
            
            <!-- Filters -->
            <div>
                <h3 class="font-bold text-gray-800 mb-3 border-b pb-1">Buscar Tutores</h3>
                <button id="btn-refresh-tutors" class="w-full bg-blue-600 text-white font-bold py-2 px-4 rounded hover:bg-blue-700 transition">
                    🔄 Actualizar Mapa
                </button>
            </div>
        </div>
    </div>

    <!-- Map Container -->
    <div class="flex-1 relative">
        <div id="map"></div>
    </div>

    <script>
        const API_BASE = "http://localhost:8000";
        const token = localStorage.getItem("token");
        const userStr = localStorage.getItem("user");

        if (!token || !userStr) {
            window.location.href = "index.html";
        }

        const user = JSON.parse(userStr);
        document.getElementById('welcome-msg').textContent = `Hola, ${user.username || user.email}`;
        document.getElementById('role-msg').textContent = `Rol: ${user.role === "student" ? "Estudiante" : "Tutor"}`;

        if (user.role === 'tutor') {
            document.getElementById('tutor-settings').classList.remove('hidden');
        }

        // Initialize Map with performance options
        const map = L.map('map', { preferCanvas: true, wheelPxPerZoomLevel: 120 }).setView([6.2312, -75.6105], 14); // Default to Medellin approx
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            maxZoom: 19,
            keepBuffer: 6,
            updateWhenZooming: false,
            updateWhenIdle: true,
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>'
        }).addTo(map);

        let myLocationMarker = null;
        let tutorMarkers = [];
        let currentLat = null;
        let currentLng = null;

        function logout() {
            localStorage.clear();
            window.location.href = "index.html";
        }

        async function geocodeAddress(address) {
            try {
                const res = await fetch(`${API_BASE}/geo/geocode?q=${encodeURIComponent(address)}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data && data.length > 0) {
                    return { lat: data[0].lat, lng: data[0].lng };
                }
                alert("Dirección no encontrada.");
                return null;
            } catch (err) {
                console.error(err);
                alert("Error al buscar la dirección.");
                return null;
            }
        }

        function setMyLocation(lat, lng, panTo=true) {
            currentLat = lat;
            currentLng = lng;
            if (myLocationMarker) {
                map.removeLayer(myLocationMarker);
            }
            myLocationMarker = L.marker([lat, lng], {
                icon: L.icon({
                    iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',
                    shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
                    iconSize: [25, 41],
                    iconAnchor: [12, 41],
                    popupAnchor: [1, -34],
                    shadowSize: [41, 41]
                })
            }).addTo(map).bindPopup("<b>Estás aquí</b>").openPopup();
            
            if(panTo) {
                map.setView([lat, lng], 13);
            }
            
            const sts = document.getElementById('loc-status');
            sts.classList.remove('hidden');
            setTimeout(() => sts.classList.add('hidden'), 3000);
            
            // Reload tutors around me automatically
            loadTutors();
        }

        document.getElementById('btn-get-location').addEventListener('click', () => {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        setMyLocation(position.coords.latitude, position.coords.longitude);
                    },
                    (err) => {
                        alert("Habilita el acceso a la ubicación o ingrésala manualmente.");
                    }
                );
            } else {
                alert("La geolocalización no es compatible con este navegador.");
            }
        });

        document.getElementById('btn-search-location').addEventListener('click', async () => {
            const val = document.getElementById('manual-location').value;
            if (!val) return;
            const coords = await geocodeAddress(val);
            if (coords) setMyLocation(coords.lat, coords.lng);
        });

        // Initialize Tutor Profile mapping
        document.getElementById('btn-set-tutor-loc').addEventListener('click', async () => {
            if (!currentLat || !currentLng) {
                alert("Please set 'Mi Ubicación' first.");
                return;
            }
            // First attempt to get profile to see if it exists
            let profileExists = true;
            try {
                const res = await fetch(`${API_BASE}/tutors/profiles/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!res.ok) profileExists = false;
            } catch (e) { profileExists = false; }

            const method = profileExists ? 'PUT' : 'POST';
            const payload = {
                specialties: ["Mecánico", "Psicólogo", "Matemáticas", "Software"],
                categories: ["académico", "profesional"],
                is_available: true,
                hourly_rate: 20.0,
                years_experience: 1,
                lat: currentLat,
                lng: currentLng
            };
            
            try {
                const res = await fetch(`${API_BASE}/tutors/profiles`, {
                    method: method,
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(payload)
                });
                if (res.ok) alert("¡Perfil de tutor actualizado con tu ubicación en el mapa!");
                else alert("Fallo al actualizar las coordenadas del perfil.");
            } catch (err) {
                console.error(err);
            }
        });

        async function loadTutors() {
            // clear old markers
            tutorMarkers.forEach(m => map.removeLayer(m));
            tutorMarkers = [];

            try {
                const res = await fetch(`${API_BASE}/tutors/?limit=100`, {
                    headers: { 'Authorization': `Bearer ${token}` } // Tutors service doesn't strictly need it to read but API gateway does mostly. 
                                                                   // Actually `list_tutors` has no token dependecy but Geo does.
                });
                const data = await res.json();
                
                if (data && data.tutors) {
                    data.tutors.forEach(tutor => {
                        if (tutor.lat && tutor.lng) {
                            // Don't show myself as a blue pin if I'm a tutor
                            if (user.role === 'tutor' && tutor.user_id === user.id) return;
                            
                            const marker = L.marker([tutor.lat, tutor.lng]).addTo(map)
                                .bindPopup(`
                                    <div class="text-center">
                                        <h4 class="font-bold text-blue-600 mb-1">${tutor.specialties && tutor.specialties.length ? tutor.specialties[0] : 'Tutor Profesional'}</h4><span class="text-xs font-semibold text-gray-700 block">${tutor.categories.join(', ')}</span><span class="text-xs text-gray-500 block mb-2">Exp: ${tutor.years_experience} años</span>
                                        <button onclick="bookTutor('${tutor.id}')" class="mt-2 bg-blue-600 text-white px-2 py-1 rounded text-xs">Reservar Tutor</button>
                                    </div>
                                `);
                            tutorMarkers.push(marker);
                        }
                    });
                }
            } catch (e) {
                console.error(e);
            }
        }
        
        document.getElementById('btn-refresh-tutors').addEventListener('click', loadTutors);

        // Run once on load
        loadTutors();
        
        // Dummy Booking func
        window.bookTutor = (tutorId) => {
            alert("La función de reserva estará disponible pronto para el Tutor ID: " + tutorId);
        };
    </script>
</body>
</html>
