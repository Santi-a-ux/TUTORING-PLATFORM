version: '3.9'

services:

  # ─── INFRAESTRUCTURA ────────────────────────────────────────────────────────

  postgres:
    image: postgis/postgis:16-3.4
    container_name: ttp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ttp}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ttp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── SERVICIOS DE DOMINIO ───────────────────────────────────────────────────

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: ttp-auth
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file: .env
    environment:
      - PORT=8001
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    container_name: ttp-users
    restart: unless-stopped
    ports:
      - "8002:8002"
    env_file: .env
    environment:
      - PORT=8002
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  tutor-service:
    build:
      context: ./services/tutor-service
      dockerfile: Dockerfile
    container_name: ttp-tutors
    restart: unless-stopped
    ports:
      - "8003:8003"
    env_file: .env
    environment:
      - PORT=8003
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  geo-service:
    build:
      context: ./services/geo-service
      dockerfile: Dockerfile
    container_name: ttp-geo
    restart: unless-stopped
    ports:
      - "8004:8004"
    env_file: .env
    environment:
      - PORT=8004
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  chat-service:
    build:
      context: ./services/chat-service
      dockerfile: Dockerfile
    container_name: ttp-chat
    restart: unless-stopped
    ports:
      - "8005:8005"
    env_file: .env
    environment:
      - PORT=8005
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  booking-service:
    build:
      context: ./services/booking-service
      dockerfile: Dockerfile
    container_name: ttp-bookings
    restart: unless-stopped
    ports:
      - "8007:8007"
    env_file: .env
    environment:
      - PORT=8007
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8007/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  media-service:
    build:
      context: ./services/media-service
      dockerfile: Dockerfile
    container_name: ttp-media
    restart: unless-stopped
    ports:
      - "8006:8006"
    env_file: .env
    environment:
      - PORT=8006
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── API GATEWAY ────────────────────────────────────────────────────────────

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: ttp-gateway
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - PORT=8000
    depends_on:
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      tutor-service:
        condition: service_healthy
      geo-service:
        condition: service_healthy
      media-service:
        condition: service_healthy
      chat-service:
        condition: service_healthy
      booking-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── FRONTEND ───────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ttp-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      gateway:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: ttp-network
